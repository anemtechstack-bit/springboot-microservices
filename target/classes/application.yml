server:
  port: 8080

spring:
  thymeleaf:
    cache: false
  datasource:
    url: jdbc:h2:mem:combo;MODE=PostgreSQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driverClassName: org.h2.Driver
    username: sa
    password:
  h2:
    console:
      enabled: true
      path: /h2
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

app:
  upload-dir: uploads
  returns:
    window-days: 7

logging:
  level:
    org.hibernate.SQL: warn
