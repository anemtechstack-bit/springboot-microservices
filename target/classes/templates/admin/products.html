<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Admin Products</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
  <div th:replace="~{fragments :: nav}"></div>

  <div class="container grid grid-2">
    <div class="card">
      <h2 style="margin:0 0 6px" th:text="${editId != null ? 'Edit Product' : 'Add Product'}">Add Product</h2>
      <p class="muted" style="margin:0 0 14px">Edit or create products. Purpose drives combo generation.</p>

      <form method="post" th:action="@{/admin/products/save}" th:object="${product}">
        <input type="hidden" th:field="*{id}"/>

        <div class="field">
          <label>Name</label>
          <input th:field="*{name}" required />
          <div class="muted" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
        </div>

        <div class="field">
          <label>Description</label>
          <textarea th:field="*{description}" required></textarea>
        </div>

        <div class="grid grid-2">
          <div class="field">
            <label>Price</label>
            <input type="number" step="0.01" min="0" th:field="*{price}" required />
          </div>
          <div class="field">
            <label>Stock</label>
            <input type="number" min="0" th:field="*{stock}" required />
          </div>
        </div>

        <div class="grid grid-2">
          <div class="field">
            <label>Purpose</label>
            <select th:field="*{purpose}" required>
              <option th:each="p : ${purposes}" th:value="${p}" th:text="${p.label}"></option>
            </select>
          </div>
          <div class="field">
            <label>Utility Score (1-10)</label>
            <input type="number" min="1" max="10" th:field="*{utilityScore}" required />
          </div>
        </div>

        <div class="field">
          <label>Image URL (optional)</label>
          <input th:field="*{imageUrl}" placeholder="https://..."/>
        </div>

        <div class="field">
          <label><input type="checkbox" th:field="*{surpriseEligible}"/> Surprise Eligible</label>
        </div>

        <button class="btn" type="submit">Save</button>
        <a class="btn secondary" th:href="@{/admin/products}">Reset</a>
        <a class="btn secondary" th:href="@{/admin}">Back</a>
      </form>
    </div>

    <div class="card">
      <h2 style="margin:0 0 6px">All Products</h2>
      <p class="muted" style="margin:0 0 14px">Edit or delete products.</p>

      <div style="overflow:auto">
        <table class="table">
          <thead><tr><th>ID</th><th>Name</th><th>Purpose</th><th>Price</th><th>Stock</th><th></th><th></th></tr></thead>
          <tbody>
          <tr th:each="p : ${products}">
            <td th:text="${p.id}">1</td>
            <td><b th:text="${p.name}">N</b></td>
            <td th:text="${p.purpose}">P</td>
            <td th:text="${p.price}">0</td>
            <td th:text="${p.stock}">0</td>
            <td><a class="btn secondary" th:href="@{/admin/products(editId=${p.id})}">Edit</a></td>
            <td>
              <form method="post" th:action="@{/admin/products/{id}/delete(id=${p.id})}" onsubmit="return confirmAction('Delete product?')">
                <button class="btn danger" type="submit">Delete</button>
              </form>
            </td>
          </tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <div th:replace="~{fragments :: footer}"></div>
  <script th:src="@{/js/app.js}"></script>
</body>
</html>
