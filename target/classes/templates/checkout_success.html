<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Success</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
  <div th:replace="~{fragments :: nav}"></div>

  <div class="container">
    <div class="card">
      <h2 style="margin:0 0 6px">✅ Order placed successfully</h2>
      <p class="muted" style="margin:0 0 14px">Order ID: <b th:text="${order.id}">0</b></p>
      <a class="btn" th:href="@{/orders/{id}(id=${order.id})}">View Order</a>
      <a class="btn secondary" th:href="@{/combo}">Create another combo</a>
    </div>
  </div>

  <div th:replace="~{fragments :: footer}"></div>
  <script th:src="@{/js/app.js}"></script>
</body>
</html>
