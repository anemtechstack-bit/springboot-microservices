<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Products</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
  <div th:replace="~{fragments :: nav}"></div>

  <div class="container">
    <div class="card">
      <div class="row" style="align-items:center;justify-content:space-between">
        <div>
          <h2 style="margin:0 0 6px">Products</h2>
          <p class="muted" style="margin:0">Filter by purpose or search by name.</p>
        </div>
        <a class="btn" th:href="@{/combo}">Generate Combo</a>
      </div>

      <form method="get" th:action="@{/products}" class="row" style="margin-top:12px;align-items:flex-end">
        <div class="field" style="min-width:220px">
          <label>Purpose</label>
          <select name="purpose">
            <option value="">All</option>
            <option th:each="p : ${purposes}" th:value="${p}" th:text="${p.label}" th:selected="${selectedPurpose} == ${p}"></option>
          </select>
        </div>
        <div class="field" style="min-width:260px">
          <label>Search</label>
          <input name="q" placeholder="Ex: bottle, candle..." th:value="${q}"/>
        </div>
        <button class="btn secondary" type="submit">Apply</button>
      </form>

      <div class="product-grid" style="margin-top:14px">
        <div class="card product-card" th:each="p : ${products}">
          <div class="product-img">
            <img th:if="${p.imageUrl != null}" th:src="${p.imageUrl}" alt="product"/>
            <div th:if="${p.imageUrl == null}" class="muted">No image</div>
          </div>
          <div class="product-body">
            <div class="row" style="align-items:center;justify-content:space-between">
              <b th:text="${p.name}">Name</b>
              <span class="chip" th:text="${p.purpose}">PURPOSE</span>
            </div>
            <div class="muted" style="margin-top:6px" th:text="${p.description}">desc</div>
            <div class="kv">
              <span class="chip">₹ <span th:text="${p.price}">0</span></span>
              <span class="chip">Stock: <span th:text="${p.stock}">0</span></span>
              <span class="chip" th:if="${p.surpriseEligible}">🎁 Surprise</span>
            </div>
            <form method="post" th:action="@{/cart/add}" style="margin-top:10px">
              <input type="hidden" name="productId" th:value="${p.id}"/>
              <button class="btn success" type="submit">Add to cart</button>
            </form>
          </div>
        </div>
      </div>

    </div>
  </div>

  <div th:replace="~{fragments :: footer}"></div>
  <script th:src="@{/js/app.js}"></script>
</body>
</html>
