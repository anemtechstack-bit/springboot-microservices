<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Combo Builder</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
  <div th:replace="~{fragments :: nav}"></div>

  <div class="container">
    <div class="card">
      <h2 style="margin:0 0 6px">Combo Builder</h2>
      <p class="muted" style="margin:0 0 16px">Select purpose, optional budget, optional surprise item.</p>

      <form method="post" th:action="@{/combo}" class="grid grid-2">
        <div class="field">
          <label>Purpose</label>
          <select name="purpose" required>
            <option th:each="p : ${purposes}" th:value="${p}" th:text="${p.label}" th:selected="${selectedPurpose} == ${p}"></option>
          </select>
        </div>

        <div class="field">
          <label>Budget (optional)</label>
          <input type="number" step="0.01" min="0" name="budget" placeholder="Ex: 999" th:value="${budget}"/>
          <div class="muted" style="font-size:12px">Leave empty to get best-value suggestions.</div>
        </div>

        <div class="field" style="grid-column:1/-1">
          <label><input type="checkbox" name="surprise" value="true" th:checked="${surprise}"/> Add small surprise item (if it fits)</label>
        </div>

        <div style="grid-column:1/-1">
          <button class="btn" type="submit">Generate Optimized Combo</button>
          <a class="btn secondary" th:href="@{/cart}">Go to Cart</a>
        </div>
      </form>
    </div>

    <div th:if="${combo != null}" class="card" style="margin-top:14px">
      <div class="row" style="align-items:center;justify-content:space-between">
        <div>
          <h2 style="margin:0">Your Combo</h2>
          <div class="muted" style="margin-top:6px">
            Total: <b th:text="${combo.total}"></b>
            <span th:if="${combo.surpriseAdded}" class="chip" style="margin-left:8px">🎁 Surprise included</span>
          </div>
        </div>

        <form method="post" th:action="@{/cart/add-combo}">
          <input type="hidden" name="productIds" th:value="${idsCsv}"/>
          <button class="btn success" type="submit">Add ALL to Cart (1 click)</button>
        </form>
      </div>

      <div class="product-grid" style="margin-top:14px">
        <div class="card product-card" th:each="p : ${combo.products}">
          <div class="product-img">
            <img th:if="${p.imageUrl != null}" th:src="${p.imageUrl}" alt="product"/>
            <div th:if="${p.imageUrl == null}" class="muted">No image</div>
          </div>
          <div class="product-body">
            <div class="row" style="align-items:center;justify-content:space-between">
              <b th:text="${p.name}">Name</b>
              <span class="chip">Stock: <span th:text="${p.stock}">0</span></span>
            </div>
            <div class="muted" style="margin-top:6px" th:text="${p.description}">desc</div>
            <div class="kv">
              <span class="chip">₹ <span th:text="${p.price}">0</span></span>
              <span class="chip">Score: <span th:text="${p.utilityScore}">0</span>/10</span>
            </div>
          </div>
        </div>
      </div>

    </div>

  </div>

  <div th:replace="~{fragments :: footer}"></div>
  <script th:src="@{/js/app.js}"></script>
</body>
</html>
