<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Cart</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
	<div th:replace="~{fragments :: nav}"></div>

  <div class="container">
    <div th:if="${error != null}" class="toast err" th:text="${error}"></div>

    <div class="card">
      <div class="row" style="align-items:center;justify-content:space-between">
        <div>
          <h2 style="margin:0">Your Cart</h2>
          <p class="muted" style="margin:6px 0 0">Update quantities or checkout (login required).</p>
        </div>
        <div class="row">
          <a class="btn secondary" th:href="@{/combo}">Add more</a>
          <form method="post" th:action="@{/cart/clear}" onsubmit="return confirmAction('Clear cart?')">
            <button class="btn danger" type="submit">Clear</button>
          </form>
        </div>
      </div>

      <div th:if="${cart.items.size() == 0}" class="muted" style="margin-top:12px">
        Cart is empty. Generate a combo and add items.
      </div>

      <div th:if="${cart.items.size() > 0}" style="margin-top:12px; overflow:auto">
        <table class="table">
          <thead>
          <tr><th>Item</th><th>Price</th><th>Qty</th><th>Total</th><th>Actions</th></tr>
          </thead>
          <tbody>
          <tr th:each="it : ${cart.items}">
            <td><b th:text="${it.name}">Name</b></td>
            <td th:text="${it.price}">0</td>
            <td>
              <form method="post" th:action="@{/cart/update}" class="row" style="gap:8px;align-items:center">
                <input type="hidden" name="productId" th:value="${it.productId}"/>
                <input type="number" name="qty" min="0" th:value="${it.quantity}" style="width:90px"/>
                <button class="btn secondary" type="submit">Update</button>
              </form>
            </td>
            <td th:text="${it.lineTotal()}">0</td>
            <td>
              <form method="post" th:action="@{/cart/remove}" onsubmit="return confirmAction('Remove this item?')">
                <input type="hidden" name="productId" th:value="${it.productId}"/>
                <button class="btn link" type="submit">Remove</button>
              </form>
            </td>
          </tr>
          </tbody>
        </table>

        <div class="row" style="align-items:center;justify-content:space-between;margin-top:12px">
          <div class="chip">Grand Total: <b th:text="${cart.total()}">0</b></div>
          <form method="post" th:action="@{/orders/checkout}">
            <button class="btn success" type="submit">Checkout</button>
          </form>
        </div>
      </div>
    </div>
  </div>

  <div th:replace="~{fragments :: footer}"></div>
  <script th:src="@{/js/app.js}"></script>
</body>
</html>
