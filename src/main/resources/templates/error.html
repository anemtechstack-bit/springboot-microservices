<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Error</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
  <div th:replace="~{fragments :: nav}"></div>
  <div class="container" style="padding-top:18px">
    <div class="card">
      <h2 style="margin:0 0 6px">Something went wrong</h2>
      <p class="muted" style="margin:0 0 14px">
        Status: <b th:text="${status}">500</b> • Path: <b th:text="${path}">/</b>
      </p>
      <div class="toast err" th:if="${error}" th:text="${error}"></div>
      <p class="muted">Please check the server console for the exact “Caused by:” line — that line tells the exact fix.</p>
      <a class="btn secondary" th:href="@{/}">Back to Home</a>
    </div>
  </div>
  <div th:replace="~{fragments :: footer}"></div>
</body>
</html>
