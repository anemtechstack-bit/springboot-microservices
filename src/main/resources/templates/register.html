<!doctype html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>Register</title>
  <link rel="stylesheet" th:href="@{/css/app.css}"/>
</head>
<body>
  <div class="container" style="padding-top:40px">
    <div class="card" style="max-width:560px;margin:0 auto">
      <h2 style="margin:0 0 6px">Create Account</h2>
      <p class="muted" style="margin:0 0 14px">Register as a normal user to place orders and request returns.</p>
      <div th:if="${error != null}" class="toast err" th:text="${error}"></div>

      <form th:action="@{/register}" method="post">
        <div class="field">
          <label>Username</label>
          <input name="username" required placeholder="Ex: rakesh" />
        </div>
        <div class="field">
          <label>Email (optional)</label>
          <input name="email" type="email" placeholder="you@example.com" />
        </div>
        <div class="field">
          <label>Password</label>
          <input name="password" type="password" required minlength="4" />
        </div>
        <button class="btn" type="submit">Create account</button>
        <a class="btn secondary" th:href="@{/login}">Back to login</a>
      </form>
    </div>
  </div>
</body>
</html>
